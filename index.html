<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HomeBase — Inventory</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:white; }
</style>
</head>

<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<script>
/* 🔥 GLOBAL ERROR HANDLER (prevents black screen) */
window.onerror = function (msg, url, line, col, error) {
  document.body.innerHTML =
    "<pre style='color:red;padding:20px;white-space:pre-wrap;'>" +
    msg + "\n\n" + (error && error.stack ? error.stack : "") +
    "</pre>";
};
</script>

<script type="text/babel">

/* ✅ SAFE SUPABASE INIT */
const SB_URL = 'https://vuftiaqztbobgujfeqth.supabase.co';
const SB_KEY = 'YOUR_KEY_HERE';

const createClient = window.supabase?.createClient;
if (!createClient) {
  throw new Error("Supabase failed to load");
}
const sb = createClient(SB_URL, SB_KEY);

/* SIMPLE TEST APP FIRST */
function App() {
  const [items, setItems] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  React.useEffect(() => {
    load();
  }, []);

  async function load() {
    try {
      const res = await sb.from('items').select('*');
      if (res.error) throw res.error;
      setItems(res.data || []);
    } catch (e) {
      throw e;
    } finally {
      setLoading(false);
    }
  }

  if (loading) return <h1 style={{padding:20}}>Loading...</h1>;

  return (
    <div style={{padding:20}}>
      <h1>HomeBase Inventory</h1>
      {items.length === 0 ? (
        <p>No items found</p>
      ) : (
        items.map(item => (
          <div key={item.id} style={{marginBottom:10}}>
            {item.name} — {item.quantity}
          </div>
        ))
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
