<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HomeBase Inventory</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#0b0f14; color:white; }
.hdr { padding:12px; background:#111826; position:sticky; top:0; }
.logo em { color:#4da3ff; font-style:normal; }
.card { background:#151c28; margin:10px; padding:10px; border-radius:10px; }
.low { border:1px solid orange; }
.out { border:1px solid red; }
.cimg img { width:100%; border-radius:8px; }
button { cursor:pointer; }
.overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center; }
.sheet { background:#111826; padding:20px; width:90%; max-width:500px; border-radius:10px; }
.btn-primary { background:#4da3ff; color:white; padding:10px; border:none; border-radius:8px; }
.btn-danger { background:#ff4d4d; color:white; padding:10px; border:none; border-radius:8px; }
</style>
</head>

<body>
<div id="root"></div>

<script>
/* ── SUPABASE ───────────────────────── */
var SB_URL = "https://vuftiaqztbobgujfeqth.supabase.co";
var SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1ZnRpYXF6dGJvYmd1amZlcXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjY2MDAsImV4cCI6MjA5MTYwMjYwMH0.ZMkybYz161OdP-VvydYg-x4E7MqJSVPKPuK1zsd3-14";
var sb = supabase.createClient(SB_URL, SB_KEY);

/* ── HELPERS ───────────────────────── */
function stockLabel(s){
  if(s==="out") return "OUT";
  if(s==="low") return "LOW";
  return "OK";
}

function stockStatus(qty, t){
  if(qty<=0) return "out";
  if(qty<=t) return "low";
  return "ok";
}

function getVal(obj,key,def){
  return obj && obj[key] !== undefined ? obj[key] : def;
}

/* ── ITEM CARD ─────────────────────── */
function ItemCard(p){
  var item=p.item;
  var s=stockStatus(item.quantity,item.low_threshold||2);

  return React.createElement("div",{className:"card "+s},
    React.createElement("div",null,
      item.name
    ),
    React.createElement("div",null,"Qty: "+item.quantity),
    React.createElement("button",{onClick:p.onPlus},"+"),
    React.createElement("button",{onClick:p.onMinus},"-")
  );
}

/* ── APP ───────────────────────────── */
function App(){
  var state = React.useState([]);
  var items = state[0];
  var setItems = state[1];

  React.useEffect(function(){
    load();
  },[]);

  async function load(){
    var {data} = await sb.from("items").select("*");
    setItems(data||[]);
  }

  async function updateQty(item,delta){
    await sb.from("items")
      .update({quantity:item.quantity+delta})
      .eq("id",item.id);

    load();
  }

  return React.createElement("div",null,
    React.createElement("div",{className:"hdr"},
      React.createElement("h2",null,"HomeBase Inventory")
    ),

    items.map(function(it){
      return React.createElement(ItemCard,{
        key:it.id,
        item:it,
        onPlus:function(){updateQty(it,1)},
        onMinus:function(){updateQty(it,-1)}
      });
    })
  );
}

ReactDOM.createRoot(document.getElementById("root"))
.render(React.createElement(App));
</script>

</body>
</html>
