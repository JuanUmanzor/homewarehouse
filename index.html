<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>HomeBase — Fixed</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5;}
.container { max-width:700px; margin:auto; padding:20px;}
.card { background:#fff; padding:12px; margin-bottom:10px; border-radius:8px; border:1px solid #ddd;}
button { padding:8px 12px; margin-top:6px;}
.error { color:red;}
.top { display:flex; justify-content:space-between; align-items:center;}
</style>
</head>

<body>
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

/* ================= SUPABASE SAFE INIT ================= */

const SB_URL = "https://vuftiaqztbobgujfeqth.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ1ZnRpYXF6dGJvYmd1amZlcXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMjY2MDAsImV4cCI6MjA5MTYwMjYwMH0.ZMkybYz161OdP-VvydYg-x4E7MqJSVPKPuK1zsd3-14"; // 🔴 PUT YOUR KEY

function initSupabase() {
  try {
    if (!window.supabase || !window.supabase.createClient) {
      console.error("❌ Supabase not loaded");
      return null;
    }
    return window.supabase.createClient(SB_URL, SB_KEY);
  } catch (e) {
    console.error("❌ Supabase init failed", e);
    return null;
  }
}

const sb = initSupabase();

/* ================= NORMALIZE DATA ================= */

function normalizeItem(raw) {
  if (!raw) return null;

  return {
    id: raw.id || Math.random(),
    name: raw.name || raw.item_name || "Unnamed",
    quantity: Number(raw.quantity ?? raw.qty ?? 0),
    category: raw.category || "Other",
    location: raw.location || "",
    note: raw.note || ""
  };
}

/* ================= APP ================= */

function App() {
  const [items, setItems] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState("");

  /* LOAD ITEMS */
  async function load() {
    if (!sb) {
      setError("Database not initialized");
      setLoading(false);
      return;
    }

    setLoading(true);
    setError("");

    try {
      const { data, error } = await sb
        .from("items")
        .select("*")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        setError(error.message);
        setItems([]);
      } else {
        const clean = (data || [])
          .map(normalizeItem)
          .filter(Boolean);

        setItems(clean);
      }

    } catch (e) {
      console.error(e);
      setError("Unexpected error");
      setItems([]);
    }

    setLoading(false);
  }

  useEffect(() => {
    load();
  }, []);

  /* ADD ITEM */
  async function addItem() {
    const name = prompt("Item name?");
    if (!name) return;

    const qty = Number(prompt("Quantity?", "1")) || 0;

    try {
      await sb.from("items").insert({
        name: name.trim(),
        quantity: qty,
        category: "Other"
      });

      load();

    } catch (e) {
      alert("Insert failed");
    }
  }

  /* DELETE */
  async function remove(id) {
    await sb.from("items").delete().eq("id", id);
    load();
  }

  /* UPDATE QTY */
  async function changeQty(item, delta) {
    const newQty = Math.max(0, item.quantity + delta);

    await sb
      .from("items")
      .update({ quantity: newQty })
      .eq("id", item.id);

    load();
  }

  /* ================= RENDER ================= */

  if (loading) {
    return <div className="container"><h2>Loading...</h2></div>;
  }

  if (error) {
    return (
      <div className="container">
        <h3 className="error">Error</h3>
        <p>{error}</p>
        <button onClick={load}>Retry</button>
      </div>
    );
  }

  if (!items || items.length === 0) {
    return (
      <div className="container">
        <h3>No items found</h3>
        <p>
          Check:
          <br/>• RLS policy
          <br/>• table name = items
        </p>
        <button onClick={load}>Reload</button>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="top">
        <h2>HomeBase ({items.length})</h2>
        <button onClick={addItem}>+ Add</button>
      </div>

      {(items || []).map(item => (
        <div key={item.id} className="card">
          <strong>{item.name}</strong>

          <div>Qty: {item.quantity}</div>
          <div>{item.category}</div>
          {item.location && <div>📍 {item.location}</div>}
          {item.note && <div>{item.note}</div>}

          <div>
            <button onClick={() => changeQty(item, -1)}>-</button>
            <button onClick={() => changeQty(item, 1)}>+</button>
            <button onClick={() => remove(item.id)}>Delete</button>
          </div>
        </div>
      ))}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
